<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", function () {
            // The API endpoint
<!--            const apiUrl = window.location.origin + "/eperusteet-service/api/perusteet/julkaisut?tyyppi=digitaalinen_osaaminen";-->
            const apiUrl = "https://eperusteet.untuvaopintopolku.fi/eperusteet-service/api/perusteet/julkaisut?tyyppi=digitaalinen_osaaminen";

            // Fetch data from the API
            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json(); // Parse the JSON response
                })
                .then(data => {
                    const id = data.data[0].id;
                    window.location.href = `${window.location.origin}/#/fi/digiosaaminen/${id}`;
                })
                .catch(error => {
                    console.error('Error fetching the API:', error);
                });
        });
    </script>
</head>

</body>
</html>
